<div class="min-h-screen relative flex items-center justify-center overflow-hidden bg-slate-900">
  <!-- Background Image with async fade-in -->
  <div class="absolute inset-0 z-0">
    <img
      src="/assets/images/fondo-dashboards-colegio.jpg"
      alt="Colegio CMAT"
      class="w-full h-full object-cover animate-fade-in duration-1000"
    />
    <div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div>
  </div>

  <!-- Back Button - Top Left -->
  <button
    routerLink="/"
    class="absolute top-6 left-6 z-20 flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-[#0E3A8A] to-[#1D4ED8] text-white rounded-lg shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 group"
  >
    <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    <span class="font-medium text-sm">Volver al inicio</span>
  </button>

  <!-- Centered Content Wrapper -->
  <div class="relative z-10 flex flex-col items-center animate-fade-in-up w-full max-w-[420px] px-4">

    <!-- Header (Logo + Text) - Outside Card -->
    <div class="text-center mb-5">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="p-2.5 bg-gradient-to-r from-[#0E3A8A] to-[#1D4ED8] rounded-xl shadow-lg ring-4 ring-white/10 backdrop-blur-sm">
          <!-- Graduation Cap Icon -->
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v7" /></svg>
        </div>
      </div>
      <h1 class="text-3xl font-bold text-white mb-1.5 drop-shadow-lg tracking-tight">Bienvenido</h1>
      <p class="text-base text-blue-100/90 font-medium drop-shadow-md">Ingresa a tu portal académico</p>
    </div>

    <!-- Form Card -->
    <div class="w-full relative">
      <!-- Elegant Card with WHITE background -->
      <div class="relative bg-white px-8 py-8 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.5)] border-2 border-white">
        <!-- Top accent line -->
        <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-[#0E3A8A] via-[#1D4ED8] to-[#0E3A8A] rounded-t-2xl"></div>

        <!-- Shield Icon - Security Badge -->
        <div class="flex justify-center -mt-2 mb-4">
          <div class="bg-gradient-to-br from-[#0E3A8A] to-[#1D4ED8] p-2.5 rounded-full shadow-lg">
            <!-- Shield Icon -->
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
          </div>
        </div>

        <form (ngSubmit)="handleSubmit()" #loginForm="ngForm" class="space-y-4">
          
          <div *ngIf="error" class="p-4 bg-red-50 border-l-4 border-red-600 rounded-r-lg animate-shake shadow-sm">
            <p class="text-sm text-red-700 font-medium">{{ error }}</p>
          </div>

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-semibold text-[#0E3A8A] mb-2.5">
                Correo electrónico
              </label>
              <div class="relative">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                  <!-- Mail Icon -->
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                </div>
                <input
                  type="email"
                  name="email"
                  [(ngModel)]="email"
                  placeholder="admin@cermatschool.edu.pe"
                  required
                  class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border-2 border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-[#1D4ED8] focus:bg-white focus:shadow-lg transition-all duration-300"
                />
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-[#0E3A8A] mb-2.5">
                Contraseña
              </label>
              <div class="relative">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                  <!-- Lock Icon -->
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </div>
                <input
                  type="password"
                  name="password"
                  [(ngModel)]="password"
                  placeholder="••••••••"
                  required
                  class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border-2 border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-[#1D4ED8] focus:bg-white focus:shadow-lg transition-all duration-300"
                />
              </div>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm pt-2">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input
                type="checkbox"
                class="w-4 h-4 rounded border-slate-300 text-[#0E3A8A] focus:ring-[#1D4ED8] focus:ring-offset-0 transition-all"
              />
              <span class="text-slate-700 group-hover:text-[#0E3A8A] transition-colors font-medium">Recordarme</span>
            </label>
            <button
              type="button"
              class="text-[#1D4ED8] hover:text-[#0E3A8A] hover:underline transition-colors font-semibold"
            >
              ¿Olvidaste tu contraseña?
            </button>
          </div>

          <div class="pt-2">
            <button
              type="submit"
              [disabled]="loading || loginForm.invalid"
              class="w-full py-2.5 bg-gradient-to-r from-[#0E3A8A] via-[#1D4ED8] to-[#0E3A8A] hover:from-[#0c2d6b] hover:via-[#1a44c2] hover:to-[#0c2d6b] text-white font-bold text-base rounded-xl shadow-xl hover:shadow-2xl hover:shadow-blue-500/30 transform hover:-translate-y-1 transition-all duration-300 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-lg flex items-center justify-center gap-2"
            >
              <ng-container *ngIf="loading">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </ng-container>
              <ng-container *ngIf="!loading">
                <span>Iniciar sesión</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
              </ng-container>
            </button>
          </div>

          <!-- Security Note -->
          <div class="pt-4 border-t border-slate-200">
            <p class="text-xs text-center text-slate-500 flex items-center justify-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
              <span>Conexión segura y encriptada</span>
            </p>
          </div>
        </form>
      </div>
    </div>

    <!-- Help Text - Outside Card -->
    <div class="mt-5 text-center animate-fade-in" style="animation-delay: 0.2s">
      <p class="text-sm text-white/90 font-medium leading-relaxed drop-shadow-md">
        ¿Necesitas ayuda para acceder?<br />
        <span class="opacity-80">Contacta a la secretaría:</span><br />
        <strong class="text-white text-base tracking-wide hover:scale-105 inline-block transition-transform cursor-pointer mt-1 bg-white/10 px-3 py-1 rounded-full border border-white/20 backdrop-blur-sm">
          +51 951 234 567
        </strong>
      </p>
    </div>
  </div>
</div>
