<!-- Background image wrapper – only for dashboard/submodule views -->
<div
  class="relative min-h-[calc(100vh-80px)] bg-cover bg-center bg-no-repeat"
  style="background-image: url('assets/images/fondo-dashboards-colegio.jpg');">

  <!-- Dark overlay for contrast -->
  <div class="absolute inset-0 bg-black/45 pointer-events-none"></div>

  <!-- ===== SUBMODULE VIEW ===== -->
  <ng-container *ngIf="activeModule; else mainGrid">
    <div class="relative z-10 pt-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto pb-12">

      <!-- Back button -->
      <app-back-button (onClick)="backToMain()"></app-back-button>

      <!-- Submodule Sections -->
      <div class="space-y-10">
        <div *ngFor="let section of activeModule.submodules">
          <!-- Section Title -->
          <h3 class="text-xl font-bold text-white border-l-4 border-yellow-400 pl-3 mb-5">
            {{ section.title }}
          </h3>

          <!-- Submodule Cards Grid -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <a
              *ngFor="let item of section.items; let i = index"
              [routerLink]="item.path"
              class="group relative flex flex-col items-center justify-center p-8 h-48 w-full bg-slate-900/80 backdrop-blur-md border border-white/10 rounded-xl hover:bg-blue-900/90 hover:scale-[1.02] hover:border-blue-400/50 transition-all duration-300 shadow-xl overflow-hidden cursor-pointer animate-slide-up"
              [style.animation-delay]="(i * 0.1) + 's'"
              style="animation-fill-mode: forwards; opacity: 0;"
            >
              <div class="absolute top-0 right-0 w-24 h-24 bg-white/5 rounded-full blur-2xl -mr-12 -mt-12 pointer-events-none group-hover:bg-blue-400/20 transition-colors"></div>
              <div class="flex flex-col items-center text-center z-10 space-y-4 w-full">
                <div class="p-3 rounded-2xl border-2 border-white/20 group-hover:border-blue-400/80 bg-transparent transition-colors duration-300 text-white">
                  <div class="w-10 h-10 flex items-center justify-center [&>svg]:w-full [&>svg]:h-full [&>svg]:stroke-[1.5]" [innerHTML]="sanitizeSvg(item.icon)"></div>
                </div>
                <h3 class="text-sm font-bold text-white tracking-widest uppercase group-hover:text-blue-100 transition-colors leading-tight">
                  {{ item.title }}
                </h3>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- ===== MAIN MODULE GRID ===== -->
  <ng-template #mainGrid>
    <div class="relative z-10 flex flex-col items-center justify-center min-h-[calc(100vh-80px)] py-12">
      <div class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

          <a *ngFor="let module of modules; let i = index"
             [routerLink]="module.submodules?.length ? null : module.path"
             (click)="openModule(module, $event)"
             class="group relative flex flex-col items-center justify-center p-8 h-64 w-full bg-slate-900/80 backdrop-blur-md border border-white/10 rounded-xl hover:bg-blue-900/90 hover:scale-[1.02] hover:border-blue-400/50 transition-all duration-300 shadow-xl overflow-hidden cursor-pointer animate-slide-up"
             [style.animation-delay]="(i * 0.05) + 's'"
             style="animation-fill-mode: forwards; opacity: 0;">

            <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none group-hover:bg-blue-400/20 transition-colors"></div>

            <div class="flex flex-col items-center text-center z-10 space-y-6 w-full">
              <div class="p-4 rounded-2xl border-2 border-white/20 group-hover:border-blue-400/80 bg-transparent transition-colors duration-300 text-white">
                <div class="w-[3.5rem] h-[3.5rem] flex items-center justify-center [&>svg]:w-full [&>svg]:h-full [&>svg]:stroke-[1.3]" [innerHTML]="sanitizeSvg(module.icon)"></div>
              </div>
              <div class="space-y-1 w-full">
                <h3 class="text-[0.95rem] font-bold text-white tracking-widest uppercase group-hover:text-blue-100 transition-colors">
                  {{ module.title }}
                </h3>
                <p class="text-[0.65rem] text-slate-300/80 uppercase tracking-wider font-medium max-w-[200px] opacity-0 group-hover:opacity-100 transition-opacity duration-300 absolute bottom-4 left-0 right-0 mx-auto">
                  {{ module.description }}
                </p>
              </div>
            </div>
          </a>

        </div>
      </div>
    </div>
  </ng-template>

</div>
