<app-back-button></app-back-button>
<div class="min-h-[calc(100vh-80px)] bg-slate-50 p-6 sm:p-10 max-w-7xl mx-auto space-y-6 animate-fade-in text-slate-700">

  <!-- Encabezado -->
  <div class="space-y-1">
    <h1 class="text-3xl font-bold text-[#0F172A] tracking-tight">Catálogo Financiero</h1>
    <p class="text-slate-500 text-sm font-medium">
      Conceptos de cobro, planes de pago y descuentos organizados en un solo lugar.
    </p>
  </div>

  <!-- Tabs estilo píldora -->
  <div class="flex flex-wrap gap-3">
    <button type="button" (click)="setTab('concepts')" [class]="tabButtonClass('concepts')">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20.59 13.41L13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1"/>
      </svg>
      Conceptos ({{ counts.concepts }})
    </button>
    <button type="button" (click)="setTab('plans')" [class]="tabButtonClass('plans')">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      Planes ({{ counts.plans }})
    </button>
    <button type="button" (click)="setTab('discounts')" [class]="tabButtonClass('discounts')">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      Descuentos ({{ counts.discounts }})
    </button>
  </div>

  <!-- Cuerpo de cada tab: se instancia (lazy) la primera vez que se abre
       y luego solo se oculta/muestra para no perder su estado ni recargar datos. -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
    <app-finance-concepts
      *ngIf="opened.concepts"
      [hidden]="activeTab !== 'concepts'"
      [highlightConceptId]="highlightConceptId">
    </app-finance-concepts>

    <app-finance-plans
      *ngIf="opened.plans"
      [hidden]="activeTab !== 'plans'"
      (conceptChipClick)="onConceptChipClick($event)">
    </app-finance-plans>

    <app-finance-discounts
      *ngIf="opened.discounts"
      [hidden]="activeTab !== 'discounts'">
    </app-finance-discounts>
  </div>
</div>
