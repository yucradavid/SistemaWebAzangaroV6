<div class="space-y-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-slide-up">
  <!-- Header Section -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200/60 relative overflow-hidden">
    <div class="absolute -right-10 -top-10 w-40 h-40 bg-cermat-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="relative z-10">
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Reporte de Progreso</h1>
      <p class="text-slate-500 mt-1 font-medium">Resumen general y métricas de desempeño del estudiante</p>
    </div>
  </div>

  <!-- Content Section -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div *ngFor="let m of metrics" class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-8 flex flex-col items-center text-center hover:shadow-xl hover:-translate-y-2 transition-all duration-300">
      <div class="w-20 h-20 rounded-2xl flex items-center justify-center mb-6 shadow-sm border relative overflow-hidden {{ m.bg }}">
        <div class="absolute inset-0 bg-white/20 backdrop-blur-sm z-0 mix-blend-overlay pointer-events-none"></div>
        <i [attr.data-lucide]="m.icon" class="w-10 h-10 z-10 {{ m.color }} drop-shadow-sm"></i>
      </div>
      <h3 class="text-slate-500 font-bold uppercase tracking-widest text-sm mb-2">{{ m.label }}</h3>
      <p class="text-4xl font-black text-slate-900 drop-shadow-sm">{{ m.value }}</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-12 text-center mt-8 relative overflow-hidden group">
    <!-- Decorative background patterns -->
    <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-slate-100 rounded-full blur-3xl opacity-50 group-hover:bg-cermat-blue-50 group-hover:opacity-100 transition-all duration-700 pointer-events-none"></div>
    <div class="absolute -top-20 -left-20 w-64 h-64 bg-slate-50 rounded-full blur-3xl opacity-50 group-hover:bg-cermat-yellow-50 group-hover:opacity-100 transition-all duration-700 pointer-events-none"></div>

    <div class="relative z-10 w-24 h-24 bg-white shadow-xl rounded-full border-4 border-slate-50 mx-auto mb-6 flex items-center justify-center -translate-y-2 group-hover:-translate-y-4 group-hover:shadow-cermat-blue-500/20 transition-all duration-500">
      <i data-lucide="pie-chart" class="w-12 h-12 text-slate-400 group-hover:text-cermat-blue-600 transition-colors"></i>
    </div>
    
    <div class="relative z-10">
      <h3 class="text-2xl font-extrabold text-slate-900 mb-3 tracking-tight">Gráficas detalladas en construcción</h3>
      <p class="text-slate-500 max-w-lg mx-auto font-medium text-lg leading-relaxed">Pronto podrá visualizar estadísticas interactivas de rendimiento a lo largo de los bimestres para tomar mejores decisiones académicas.</p>
    </div>
  </div>
</div>
