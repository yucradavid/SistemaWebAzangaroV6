<section class="py-16 md:py-24 bg-blue-950 relative overflow-hidden">
  
  <div class="absolute inset-0 opacity-20">
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-500 rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2"></div>
    <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-yellow-400 rounded-full blur-[80px] translate-y-1/3 -translate-x-1/3"></div>
  </div>

  <div class="container-cermat relative z-10 px-4">
    
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-2 px-3 py-1 bg-white/10 backdrop-blur-sm border border-white/20 rounded-full mb-4">
        <span class="text-yellow-400">💬</span>
        <span class="text-white text-xs font-bold uppercase tracking-wider">Testimonios</span>
      </div>
      <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">
        La voz de nuestra <span class="text-yellow-400">Familia</span>
      </h2>
    </div>

    <div class="max-w-3xl mx-auto relative">
      
      <div class="glass-cermat rounded-2xl p-8 md:p-10 border border-white/10 shadow-2xl relative overflow-hidden">
        
        <div class="absolute top-4 right-6 opacity-10 pointer-events-none">
          <svg class="w-24 h-24 text-white" fill="currentColor" viewBox="0 0 32 32">
            <path d="M9.352 4C4.456 7.456 1 13.12 1 19.36c0 5.088 3.072 8.064 6.624 8.064 3.36 0 5.856-2.688 5.856-5.856 0-3.168-2.208-5.472-5.088-5.472-.576 0-1.344.096-1.536.192.48-3.264 3.552-7.104 6.624-9.024L9.352 4zm16.512 0c-4.8 3.456-8.256 9.12-8.256 15.36 0 5.088 3.072 8.064 6.624 8.064 3.264 0 5.856-2.688 5.856-5.856 0-3.168-2.304-5.472-5.184-5.472-.576 0-1.248.096-1.44.192.48-3.264 3.456-7.104 6.528-9.024L25.864 4z"/>
          </svg>
        </div>

        <div class="relative z-10 flex flex-col items-center text-center">
          
          <div class="flex gap-1 mb-6">
            <svg *ngFor="let star of [1,2,3,4,5]" class="w-5 h-5 text-yellow-400 fill-current" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
          </div>

          <blockquote class="text-lg md:text-xl text-white font-medium leading-relaxed mb-8 italic opacity-90">
            "{{ currentTestimonial()?.text }}"
          </blockquote>

          <div class="w-12 h-px bg-white/30 mb-6"></div>

          <div class="flex items-center gap-4 text-left">
            <div class="relative flex-shrink-0">
              <img [src]="currentTestimonial()?.image" 
                   [alt]="currentTestimonial()?.name" 
                   class="w-14 h-14 rounded-full object-cover border-2 border-white/50 shadow-md"/>
              <div class="absolute -bottom-1 -right-1 bg-blue-500 rounded-full p-0.5 border border-white">
                <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
              </div>
            </div>

            <div>
              <p class="font-bold text-white text-base leading-tight">{{ currentTestimonial()?.name }}</p>
              <div class="flex items-center gap-2 mt-1">
                <span class="text-white/60 text-sm">{{ currentTestimonial()?.role }}</span>
                <span class="w-1 h-1 bg-white/40 rounded-full"></span>
                <span class="text-yellow-400 text-xs font-bold uppercase tracking-wide">{{ currentTestimonial()?.level }}</span>
              </div>
            </div>
          </div>

        </div>

        <div class="flex justify-center gap-2 mt-8">
          <button *ngFor="let testimonial of testimonials(); let i = index"
                  (click)="goToSlide(i)"
                  class="h-1.5 rounded-full transition-all duration-300 cursor-pointer"
                  [ngClass]="{
                    'bg-yellow-400 w-8': i === currentIndex(),
                    'bg-white/20 w-2 hover:bg-white/40': i !== currentIndex()
                  }"
                  [attr.aria-label]="'Testimonio ' + (i + 1)">
          </button>
        </div>

      </div>

      <button (click)="prevSlide()"
              class="hidden md:flex absolute top-1/2 -left-16 -translate-y-1/2 w-10 h-10 items-center justify-center text-white/50 hover:text-white hover:scale-110 transition-all">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <button (click)="nextSlide()"
              class="hidden md:flex absolute top-1/2 -right-16 -translate-y-1/2 w-10 h-10 items-center justify-center text-white/50 hover:text-white hover:scale-110 transition-all">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </button>

    </div>
  </div>
</section>
