<section class="py-24 bg-gray-50 relative overflow-hidden">
  
  <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-100/40 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

  <div class="container-cermat relative z-10">
    
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
      <div class="max-w-2xl">
        
        <div class="relative inline-block mb-4">
          <svg class="absolute inset-0 w-full h-full text-blue-200 -z-10 transform scale-110 -rotate-2" viewBox="0 0 100 30" preserveAspectRatio="none" fill="currentColor">
            <path d="M0,15 C10,5 40,0 95,5 C100,5 100,20 90,25 C60,30 20,30 5,25 C-5,20 0,15 0,15 Z" />
          </svg>
          
          <span class="relative z-10 font-bold tracking-widest uppercase text-sm text-blue-900 px-4 py-1">
            Vida Escolar
          </span>
        </div>

        <h2 class="text-4xl md:text-5xl font-black text-gray-900 leading-tight">
          Momentos que <span class="gradient-cermat-text">Inspiran</span>
        </h2>
        
        <p class="text-lg text-gray-500 mt-4 leading-relaxed pl-4 border-l-4 border-yellow-400">
          Descubre la energía, el aprendizaje y la alegría que se vive día a día en nuestras aulas y patios.
        </p>
      </div>
      
      <a href="/galeria" class="hidden md:inline-flex items-center gap-2 btn-cermat-outline text-blue-900 border-blue-200 hover:border-blue-600 !py-3 !px-6 !text-base bg-white/50 backdrop-blur-sm group">
        Ver galería completa
        <svg class="w-5 h-5 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 auto-rows-[280px] gap-6">
      
      <div *ngFor="let img of galleryImages; let i = index" 
           class="group relative overflow-hidden cursor-pointer"
           (click)="openLightbox(i)"
           [ngClass]="{
             'md:col-span-2 md:row-span-2': i === 0, 
             'md:col-span-1 md:row-span-1': i !== 0 && i !== 3,
             'md:col-span-2 md:row-span-1': i === 3
           }">
        
        <div class="card-cermat h-full p-0 overflow-hidden relative border border-gray-100">
          
          <img [src]="img.url" [alt]="img.title" 
               class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-out"/>
          
          <div class="absolute inset-0 bg-gradient-to-t from-blue-950/90 via-blue-950/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          
          <div class="absolute bottom-0 left-0 w-full p-6 translate-y-4 group-hover:translate-y-0 transition-transform duration-300 opacity-0 group-hover:opacity-100">
            <span class="inline-block px-3 py-1 bg-yellow-400 text-blue-950 text-xs font-bold uppercase tracking-wide rounded-md mb-2 shadow-sm">
              {{ img.category }}
            </span>
            <h3 class="text-white font-bold text-lg leading-snug">{{ img.title }}</h3>
          </div>

          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-14 glass-cermat rounded-full flex items-center justify-center text-white opacity-0 scale-50 group-hover:opacity-100 group-hover:scale-100 transition-all duration-300">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7" />
            </svg>
          </div>
        </div>

      </div>
    </div>


  </div>

  <div *ngIf="isLightboxOpen()" 
       class="fixed inset-0 z-50 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-4 animate-fade-in"
       (click)="closeLightbox()">
    
    <button (click)="closeLightbox()" 
            class="absolute top-6 right-6 w-12 h-12 glass-cermat rounded-full flex items-center justify-center text-white hover:bg-white hover:text-blue-900 transition-all z-50">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <button *ngIf="currentImageIndex() > 0" 
            (click)="prevImage($event)" 
            class="absolute left-4 md:left-8 w-12 h-12 glass-cermat rounded-full flex items-center justify-center text-white hover:bg-white hover:text-blue-900 transition-all z-50">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <button *ngIf="currentImageIndex() < galleryImages.length - 1" 
            (click)="nextImage($event)" 
            class="absolute right-4 md:right-8 w-12 h-12 glass-cermat rounded-full flex items-center justify-center text-white hover:bg-white hover:text-blue-900 transition-all z-50">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <div class="max-w-7xl w-full max-h-[90vh] flex flex-col items-center" (click)="$event.stopPropagation()">
      <img [src]="galleryImages[currentImageIndex()].url" 
           class="w-auto h-auto max-h-[80vh] object-contain rounded-2xl shadow-2xl mb-6 border border-white/10"/>
      
      <div class="text-center">
        <h3 class="text-2xl font-bold text-white mb-2">{{ galleryImages[currentImageIndex()].title }}</h3>
        <span class="inline-block px-3 py-1 glass-cermat rounded-full text-yellow-300 text-sm font-medium">
            {{ galleryImages[currentImageIndex()].category }}
        </span>
      </div>
    </div>
  </div>

</section>
