<div class="min-h-screen bg-gray-50">

  <section class="relative bg-gradient-to-r from-blue-900 to-blue-700 text-white py-32 overflow-hidden">
    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#ffffff 2px, transparent 2px); background-size: 30px 30px;"></div>

    <div class="container-custom text-center relative z-10">
      <h1 class="text-4xl md:text-6xl font-bold mb-6 tracking-tight">
        Noticias y <span class="text-yellow-400">Eventos</span>
      </h1>
      <p class="text-xl text-blue-100 max-w-2xl mx-auto">
        Mantente informado sobre los logros, actividades y comunicados de nuestra comunidad educativa.
      </p>
    </div>

    <div class="absolute bottom-0 w-full h-1 bg-gradient-to-r from-red-600 via-yellow-400 to-blue-600"></div>
  </section>

  <section class="section-padding py-16">
    <div class="container-custom px-4">
      <div *ngIf="loading" class="text-center py-16 text-lg font-semibold text-blue-700">Cargando noticias...</div>
      <div *ngIf="error" class="text-center py-16 text-lg font-semibold text-red-600">{{ error }}</div>
      <div *ngIf="!loading && !error && news().length === 0" class="text-center py-16 text-lg font-semibold text-gray-500">No hay noticias disponibles.</div>

      <div *ngIf="!loading && !error && news().length > 0" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">

        <article *ngFor="let item of news()" class="bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 group border border-gray-100 flex flex-col h-full">
          <div class="relative overflow-hidden h-56 flex-shrink-0">
            <div class="absolute inset-0 bg-blue-900/20 group-hover:bg-transparent transition-colors z-10"></div>
            <img [src]="item.image" [alt]="item.title" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"/>

            <div class="absolute top-4 left-4 z-20">
              <span class="px-3 py-1 bg-blue-700 text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-sm">
                {{ item.category }}
              </span>
            </div>

            <div *ngIf="item.featured" class="absolute top-4 right-4 z-20">
              <span class="px-3 py-1 bg-yellow-400 text-blue-900 text-xs font-bold rounded-lg shadow-sm flex items-center gap-1 border border-yellow-300">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                Destacado
              </span>
            </div>
          </div>

          <div class="p-6 flex flex-col flex-1 relative">
            <div class="absolute left-0 top-6 bottom-6 w-1 bg-yellow-400 transform scale-y-0 group-hover:scale-y-100 transition-transform origin-bottom duration-300"></div>

            <div class="flex items-center gap-2 text-gray-500 text-sm mb-3 font-medium">
              <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
              {{ formatDate(item.date) }}
            </div>

            <h3 class="text-xl font-bold text-gray-900 mb-3 line-clamp-2 group-hover:text-blue-700 transition-colors leading-tight">
              {{ item.title }}
            </h3>

            <p class="text-gray-600 mb-6 line-clamp-3 text-sm flex-1 leading-relaxed">
              {{ item.excerpt }}
            </p>

            <div class="pt-4 border-t border-gray-100 mt-auto">
              <a [routerLink]="['/noticias', item.slug]" class="inline-flex items-center gap-2 text-red-600 font-bold text-sm hover:text-red-700 hover:gap-4 transition-all group-hover:translate-x-1">
                Leer noticia completa
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
              </a>
            </div>
          </div>
        </article>

      </div>

      <div class="mt-12 text-center">
        <button class="px-8 py-3 bg-white border-2 border-blue-600 text-blue-600 font-bold rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-sm hover:shadow-lg">
          Ver todas las noticias
        </button>
      </div>

    </div>
  </section>
</div>
