<header class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4 transition-all duration-500"
  [ngClass]="isScrolled() ? 'translate-y-0' : 'translate-y-0'">
  
  <div class="bg-blue-950/90 backdrop-blur-xl border border-white/10 rounded-full shadow-2xl shadow-blue-900/20 px-2 py-2 flex items-center justify-between gap-2 max-w-5xl w-full transition-all duration-300 hover:bg-blue-950/95"
       [ngClass]="isScrolled() ? 'scale-100' : 'scale-[1.02]'">

    <a routerLink="/" class="flex-shrink-0 group">
      <div class="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center transition-transform transform group-hover:rotate-12 group-hover:scale-105 border-2 border-transparent group-hover:border-yellow-400">
        <svg class="w-6 h-6 text-blue-950" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 14l9-5-9-5-9 5 9 5z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
        </svg>
      </div>
    </a>

    <nav class="hidden lg:flex items-center gap-1">
      <a *ngFor="let item of menuItems" 
         [routerLink]="item.route" 
         routerLinkActive="bg-white/10 text-white font-semibold"
         [routerLinkActiveOptions]="{exact: item.route === '/'}"
         class="px-5 py-2.5 rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-300 font-medium tracking-wide">
         {{ item.label }}
      </a>
    </nav>

    <div class="flex items-center gap-2">
      
      <button routerLink="/login" class="hidden lg:flex px-6 py-2.5 bg-white text-blue-950 rounded-full font-bold text-sm hover:bg-yellow-400 hover:text-blue-950 transition-colors shadow-lg shadow-white/10 items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
        <span>Portal</span>
      </button>

      <button (click)="toggleMobileMenu()" 
              class="lg:hidden w-10 h-10 md:w-12 md:h-12 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white transition-colors">
         <div class="w-5 h-5 flex flex-col justify-center gap-1.5">
            <span class="w-full h-0.5 bg-current rounded-full transition-all" [ngClass]="{'rotate-45 translate-y-2': isMobileMenuOpen()}"></span>
            <span class="w-full h-0.5 bg-current rounded-full transition-all" [ngClass]="{'opacity-0': isMobileMenuOpen()}"></span>
            <span class="w-full h-0.5 bg-current rounded-full transition-all" [ngClass]="{'-rotate-45 -translate-y-2': isMobileMenuOpen()}"></span>
         </div>
      </button>
    </div>

  </div>

  <div class="absolute top-20 left-4 right-4 bg-blue-950/95 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-4 lg:hidden origin-top transition-all duration-300 ease-out z-40 overflow-hidden"
       [ngClass]="isMobileMenuOpen() ? 'scale-100 opacity-100 visible' : 'scale-95 opacity-0 invisible'">
    
    <div class="flex flex-col gap-2">
      <a *ngFor="let item of menuItems" 
         [routerLink]="item.route" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-white text-blue-950 font-bold"
         [routerLinkActiveOptions]="{exact: item.route === '/'}"
         class="px-6 py-4 rounded-2xl text-gray-300 hover:bg-white/10 hover:text-white transition-all text-center text-lg font-medium">
         {{ item.label }}
      </a>
      
      <div class="h-px w-full bg-white/10 my-2"></div>
      
      <button routerLink="/login" (click)="closeMobileMenu()" class="w-full px-6 py-4 bg-yellow-400 text-blue-950 rounded-2xl font-bold hover:bg-yellow-300 transition-colors flex items-center justify-center gap-2 text-lg">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
        Ingresar a Portal
      </button>
    </div>
  </div>

</header>
