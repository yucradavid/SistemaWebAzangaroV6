<div class="min-h-screen bg-slate-50 flex flex-col font-sans">

  <!-- TOPBAR EXACTAMENTE COMO LA IMAGEN -->
  <header
    class="bg-[#1e3a8a] text-white h-16 sm:h-20 flex items-center justify-between px-6 sm:px-10 shadow-md relative z-50">

    <!-- Left side: Logo & Title & Back Button -->
    <div class="flex items-center gap-4">
      <!-- Graduation Cap Logo -->
      <div
        class="w-10 h-10 sm:w-12 sm:h-12 bg-white/10 rounded-xl flex items-center justify-center border border-white/20">
        <svg class="w-6 h-6 sm:w-7 sm:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
        </svg>
      </div>

      <div class="flex flex-col">
        <h1 class="text-lg sm:text-xl font-bold tracking-tight leading-tight">Colegio CMAT</h1>

        <!-- Back to Menu button -->
        <button [routerLink]="dashboardRoute"
          class="flex items-center gap-1.5 text-xs text-blue-200 hover:text-white transition-colors mt-0.5 group">
          <svg class="w-3 h-3 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          <span class="font-medium uppercase tracking-wider">Volver al menú</span>
        </button>
      </div>
    </div>

    <!-- Right side: Role & Logout -->
    <div class="flex items-center gap-6">
      <div class="flex flex-col items-end">
        <span class="text-sm font-bold tracking-wide">{{ currentUser?.name || 'Usuario' }}</span>
        <!-- Role Badge -->
        <span
          class="px-2.5 py-0.5 rounded-full bg-white/20 text-[10px] font-semibold uppercase tracking-widest mt-0.5 border border-white/10">
          {{ currentUser?.role || 'Visitante' }}
        </span>
      </div>

      <!-- Logout Icon -->
      <button (click)="logout()"
        class="p-2 hover:bg-white/10 rounded-lg transition-colors text-blue-200 hover:text-white" title="Cerrar sesión">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 w-full overflow-y-auto bg-slate-50">
    <div class="h-full">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
